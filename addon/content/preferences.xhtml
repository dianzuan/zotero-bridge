<vbox xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
     xmlns:html="http://www.w3.org/1999/xhtml">

<groupbox>
  <hbox align="center">
    <label id="zotron-lang-label" value="Language:" style="width: 120px;" />
    <menulist id="zotron-language" preference="ui.language">
      <menupopup>
        <menuitem id="zotron-lang-en" label="English" value="en-US" />
        <menuitem id="zotron-lang-zh" label="Chinese" value="zh-CN" />
      </menupopup>
    </menulist>
  </hbox>
</groupbox>

<groupbox>
  <label><html:h2 id="zotron-ocr-title">OCR Settings</html:h2></label>
  <hbox align="center">
    <label id="zotron-ocr-provider-label" value="OCR Provider:" style="width: 120px;" />
    <menulist id="zotron-ocr-provider" preference="ocr.provider">
      <menupopup>
        <menuitem label="GLM-OCR" value="glm" />
        <menuitem label="Qwen-VL-OCR" value="qwen" />
        <menuitem label="Custom OCR" value="custom" />
      </menupopup>
    </menulist>
  </hbox>
  <hbox align="center">
    <label id="zotron-ocr-key-label" value="API Key:" style="width: 120px;" />
    <html:input id="zotron-ocr-apikey" type="password"
                preference="ocr.apiKey" placeholder="Leave empty until you configure a provider token"
                style="flex: 1;"></html:input>
    <button id="zotron-ocr-test" label="Test" />
  </hbox>
  <html:p id="zotron-ocr-status" style="font-size: 11px; color: #888; margin: 2px 0 0 124px;"></html:p>
  <hbox align="center">
    <label id="zotron-ocr-model-label" value="Model:" style="width: 120px;" />
    <html:input id="zotron-ocr-model" type="text"
                preference="ocr.model" readonly="readonly"
                style="flex: 1; color: #888;"></html:input>
  </hbox>
  <hbox align="center">
    <label id="zotron-ocr-url-label" value="API URL:" style="width: 120px;" />
    <html:input id="zotron-ocr-apiurl" type="text"
                preference="ocr.apiUrl" readonly="readonly"
                style="flex: 1; color: #888;"></html:input>
  </hbox>
</groupbox>

<groupbox>
  <label><html:h2 id="zotron-emb-title">Embedding Settings</html:h2></label>
  <hbox align="center">
    <label id="zotron-emb-provider-label" value="Provider:" style="width: 120px;" />
    <menulist id="zotron-emb-provider" preference="embedding.provider">
      <menupopup>
        <menuitem label="Doubao" value="doubao" />
        <menuitem label="Ollama" value="ollama" />
        <menuitem label="Zhipu" value="zhipu" />
        <menuitem label="DashScope" value="dashscope" />
        <menuitem label="SiliconFlow" value="siliconflow" />
        <menuitem label="Jina" value="jina" />
        <menuitem label="Voyage AI" value="voyage" />
        <menuitem label="Cohere" value="cohere" />
        <menuitem label="Google Gemini" value="gemini" />
        <menuitem label="OpenAI" value="openai" />
      </menupopup>
    </menulist>
  </hbox>
  <hbox align="center">
    <label id="zotron-emb-key-label" value="API Key:" style="width: 120px;" />
    <html:input id="zotron-emb-apikey" type="password"
                preference="embedding.apiKey" placeholder="Leave empty until you configure a provider token"
                style="flex: 1;"></html:input>
    <button id="zotron-emb-test" label="Test" />
  </hbox>
  <html:p id="zotron-emb-status" style="font-size: 11px; color: #888; margin: 2px 0 0 124px;"></html:p>
  <hbox align="center">
    <label id="zotron-emb-model-label" value="Model:" style="width: 120px;" />
    <html:input id="zotron-emb-model" type="text"
                preference="embedding.model" readonly="readonly"
                style="flex: 1; color: #888;"></html:input>
  </hbox>
  <hbox align="center">
    <label id="zotron-emb-url-label" value="API URL:" style="width: 120px;" />
    <html:input id="zotron-emb-apiurl" type="text"
                preference="embedding.apiUrl" readonly="readonly"
                style="flex: 1; color: #888;"></html:input>
  </hbox>
</groupbox>

</vbox>
